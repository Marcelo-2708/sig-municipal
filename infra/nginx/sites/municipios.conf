# ============================================================
# SIG Municipal — Virtual hosts multi-subdominio
# ============================================================
#
# DESARROLLO (*.localhost):
#   Funciona directamente sin configuración adicional.
#   Acceder con: http://demo.localhost
#   Requiere entrada en /etc/hosts del equipo anfitrión:
#     127.0.0.1  demo.localhost
#
# PRODUCCIÓN (*.DOMINIO_BASE):
#   Los bloques de producción están comentados al final del archivo.
#   Para activarlos:
#     1. Descomentarlos.
#     2. Reemplazar DOMINIO_BASE por el dominio real (ej: sig.municipalidad.cl).
#     3. Asegurarse de que los certificados Let's Encrypt existen en:
#        /etc/letsencrypt/live/DOMINIO_BASE/
#   Alternativamente, procesar este archivo con envsubst antes de
#   desplegarlo y mantener ${DOMINIO_BASE} como placeholder:
#     envsubst '${DOMINIO_BASE}' < municipios.conf > /etc/nginx/conf.d/municipios.conf
#
# NOTA SOBRE VARIABLES DE ENTORNO EN NGINX:
#   Nginx NO expande variables de entorno del sistema ($VAR) en su
#   configuración nativa. Para usar DOMINIO_BASE del .env en producción,
#   el entrypoint del contenedor debe ejecutar envsubst antes de
#   iniciar nginx (ver instrucciones de producción más abajo).
# ============================================================

# ----------------------------------------------------------
# BLOQUES UPSTREAM
# Definen los grupos de servidores internos hacia los que
# Nginx distribuirá las peticiones.
# ----------------------------------------------------------

# API REST del backend (Node.js + Fastify)
upstream backend_api {
    server sig_backend:3000;

    # Mantiene conexiones TCP abiertas hacia el backend (mejora rendimiento)
    keepalive 32;
}

# Servidor de archivos estáticos del frontend (React)
# En desarrollo: Vite dev server en puerto 5173
# En producción: Nginx interno del contenedor frontend en puerto 80
upstream frontend_app {
    server sig_frontend:80;

    keepalive 16;
}

# Servidor de mapas GeoServer (WMS/WFS/WMTS)
upstream geoserver_wms {
    server sig_geoserver:8080;

    keepalive 16;
}


# ============================================================
# SERVER BLOCK: DESARROLLO LOCAL — *.localhost (puerto 80)
# ============================================================
# Captura cualquier subdominio *.localhost y extrae el nombre
# del municipio en la variable $municipio para uso en logs.
# Ejemplo: http://demo.localhost → $municipio = "demo"
# ============================================================
server {
    listen 80;

    # Captura subdominios *.localhost; almacena el prefijo en $municipio
    server_name ~^(?<municipio>[^.]+)\.localhost$;

    # Identificador del municipio en los logs de acceso
    access_log /var/log/nginx/access.log json_estructurado;
    error_log  /var/log/nginx/error.log warn;

    # ----------------------------------------------------------
    # API REST: /api/ → backend_api
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass http://backend_api;

        # Cabeceras necesarias para que el backend conozca el cliente real
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Nombre del municipio como cabecera personalizada (multi-tenancy)
        proxy_set_header X-Municipio       $municipio;

        # Necesario para keep-alive con upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ----------------------------------------------------------
    # GEOSERVER ADMIN: BLOQUEADO
    # El panel de administración de GeoServer nunca debe ser
    # accesible públicamente — solo desde la red interna o VPN.
    # ----------------------------------------------------------
    location /geoserver/web/ {
        return 403 "Acceso al panel de administracion de GeoServer no permitido.";
        add_header Content-Type text/plain;
    }

    # ----------------------------------------------------------
    # GEOSERVER WMS/WFS: /geoserver/ → geoserver_wms
    # Reescribe la ruta para que GeoServer reciba el prefijo /geoserver/
    # ----------------------------------------------------------
    location /geoserver/ {
        proxy_pass http://geoserver_wms/geoserver/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # GeoServer puede tardar en renderizar mapas complejos
        proxy_read_timeout 120s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ----------------------------------------------------------
    # FRONTEND SPA: / → frontend_app
    # try_files intenta primero el archivo estático; si no existe,
    # reenvía la petición al upstream (necesario para React Router
    # con history API — evita 404 en rutas como /municipio/capas).
    # ----------------------------------------------------------
    location / {
        proxy_pass http://frontend_app;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Necesario para WebSocket de Vite HMR (hot-module reload en desarrollo)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}


# ============================================================
# SERVER BLOCKS: PRODUCCIÓN — *.DOMINIO_BASE
# ============================================================
# INSTRUCCIONES PARA ACTIVAR EN PRODUCCIÓN:
#
# Opción A — Reemplazar manualmente:
#   Descomentar los bloques siguientes y reemplazar todas las
#   ocurrencias de "DOMINIO_BASE" por el dominio real,
#   por ejemplo: sig.municipalidad.cl
#
# Opción B — Con envsubst (recomendada para CI/CD):
#   Mantener DOMINIO_BASE como placeholder y procesar con:
#     export DOMINIO_BASE=sig.municipalidad.cl
#     envsubst '${DOMINIO_BASE}' < municipios.conf \
#       > /etc/nginx/conf.d/municipios.conf
#   Luego reiniciar nginx: nginx -s reload
#
# PRE-REQUISITO SSL:
#   Los certificados deben existir antes de iniciar nginx:
#     certbot certonly --webroot \
#       -w /var/www/certbot \
#       -d "*.DOMINIO_BASE" \
#       --email admin@DOMINIO_BASE
# ============================================================

