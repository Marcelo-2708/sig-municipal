# ============================================================
# SIG Municipal — Configuración principal de Nginx
# ============================================================
# Proxy inverso multi-tenant para la plataforma WebGIS.
# Cada municipalidad accede por su propio subdominio.
#
# Montado en el contenedor sig_nginx como:
#   /etc/nginx/nginx.conf
# ============================================================

# Número de procesos worker; "auto" usa todos los núcleos disponibles
worker_processes auto;

# Nivel de log de errores: warn en producción, debug en desarrollo
error_log /var/log/nginx/error.log warn;

# Archivo PID del proceso principal
pid /var/run/nginx.pid;

events {
    # Conexiones simultáneas máximas por worker
    worker_connections 1024;

    # Acepta múltiples conexiones nuevas en un solo ciclo de eventos
    multi_accept on;
}

http {
    # ----------------------------------------------------------
    # TIPOS MIME
    # ----------------------------------------------------------
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ----------------------------------------------------------
    # FORMATO DE LOG EN JSON
    # Facilita la ingesta en herramientas de observabilidad (ELK, Loki, etc.)
    # Campos: timestamp, método HTTP, URI, status, tiempo de respuesta,
    #         IP real del cliente (respeta X-Forwarded-For de balanceadores)
    # ----------------------------------------------------------
    log_format json_estructurado escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"metodo":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_enviados":$bytes_sent,'
            '"tiempo_respuesta":$request_time,'
            '"ip_cliente":"$http_x_forwarded_for",'
            '"ip_remota":"$remote_addr",'
            '"host":"$host",'
            '"referer":"$http_referer",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_estructurado;

    # ----------------------------------------------------------
    # RENDIMIENTO DE RED
    # ----------------------------------------------------------
    # Usa sendfile() del kernel para transferir archivos sin copias extra
    sendfile on;

    # Envía cabeceras TCP en el primer paquete (optimiza latencia)
    tcp_nopush  on;
    tcp_nodelay on;

    # Tiempo máximo que una conexión keep-alive permanece abierta (inactiva)
    keepalive_timeout 65;

    # ----------------------------------------------------------
    # TIMEOUTS DE PROXY
    # proxy_connect_timeout: tiempo para establecer conexión con upstream
    # proxy_send_timeout:    tiempo para enviar la petición al upstream
    # proxy_read_timeout:    tiempo de espera de respuesta del upstream
    #                        (120s para GeoServer que puede tardar en renderizar)
    # ----------------------------------------------------------
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    120s;

    # Tamaño máximo de cuerpo de petición — necesario para uploads de shapefiles
    client_max_body_size 50m;

    # ----------------------------------------------------------
    # COMPRESIÓN GZIP
    # Activa para texto, JSON, SVG, JavaScript y CSS
    # No comprimir imágenes ni binarios (ya están comprimidos)
    # ----------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/geo+json
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ----------------------------------------------------------
    # CABECERAS DE SEGURIDAD GLOBALES
    # Aplicadas a todas las respuestas del proxy
    # ----------------------------------------------------------
    # Evita que la página sea embebida en iframes de otros dominios
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Evita que el navegador adivine el tipo MIME (sniffing)
    add_header X-Content-Type-Options "nosniff" always;

    # Activa el filtro XSS del navegador (legacy, pero útil para IE/Edge)
    add_header X-XSS-Protection "1; mode=block" always;

    # Controla qué información de referrer se envía al navegar entre dominios
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----------------------------------------------------------
    # CONFIGURACIONES DE SITIO
    # Cada archivo en conf.d/ define un virtual host (municipio)
    # ----------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
