# ============================================================
# SIG Municipal — Plataforma WebGIS Multi-Tenant
# Docker Compose para PRODUCCIÓN
# ============================================================
# Uso:    docker compose -f docker-compose.prod.yml up -d
# Prerrequisito: archivo .env con valores de producción
#
# SEGURIDAD: En producción NINGÚN servicio interno expone
# puertos al exterior. Solo sig_nginx escucha en 0.0.0.0.
# El resto de servicios se comunica exclusivamente dentro
# de la red interna sig_red.
# ============================================================

services:

  # ----------------------------------------------------------
  # BASE DE DATOS: PostgreSQL 15 con extensión PostGIS 3.4
  # ----------------------------------------------------------
  sig_postgres:
    image: postgis/postgis:15-3.4
    container_name: sig_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    # Sin puertos expuestos — acceso solo por red interna
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - sig_red
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # SERVIDOR DE MAPAS: GeoServer 2.24.0
  # ----------------------------------------------------------
  sig_geoserver:
    image: kartoza/geoserver:2.24.0
    container_name: sig_geoserver
    restart: unless-stopped
    environment:
      GEOSERVER_ADMIN_USER:     ${GEOSERVER_USER}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_PASSWORD}
      INITIAL_MEMORY: 1G
      MAXIMUM_MEMORY: 4G
    # Sin puertos expuestos — acceso solo a través de Nginx
    volumes:
      - geoserver_data:/opt/geoserver_data
      - ../../geoserver/estilos:/opt/geoserver_data/styles:ro
    networks:
      - sig_red
    depends_on:
      sig_postgres:
        condition: service_healthy

  # ----------------------------------------------------------
  # CACHÉ EN MEMORIA: Redis 7
  # ----------------------------------------------------------
  sig_redis:
    image: redis:7-alpine
    container_name: sig_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --save 60 1000
    # Sin puertos expuestos — acceso solo por red interna
    volumes:
      - redis_data:/data
    networks:
      - sig_red
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------
  # BACKEND: API REST Node.js + Fastify
  # Build de producción (sin hot-reload)
  # ----------------------------------------------------------
  sig_backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: produccion
    container_name: sig_backend
    restart: unless-stopped
    environment:
      NODE_ENV:          production
      DB_USER:           ${DB_USER}
      DB_PASSWORD:       ${DB_PASSWORD}
      DB_NAME:           ${DB_NAME}
      DB_HOST:           sig_postgres
      DB_PORT:           5432
      REDIS_URL:         ${REDIS_URL}
      JWT_SECRET:        ${JWT_SECRET}
      GEOSERVER_URL:     ${GEOSERVER_URL}
      GEOSERVER_USER:    ${GEOSERVER_USER}
      GEOSERVER_PASSWORD: ${GEOSERVER_PASSWORD}
      DOMINIO_BASE:      ${DOMINIO_BASE}
    # Sin puertos expuestos — tráfico solo a través de Nginx
    networks:
      - sig_red
    depends_on:
      sig_postgres:
        condition: service_healthy
      sig_redis:
        condition: service_healthy
      sig_geoserver:
        condition: service_started

  # ----------------------------------------------------------
  # FRONTEND: React + MapLibre GL JS
  # Build estático servido por Nginx interno del contenedor
  # ----------------------------------------------------------
  sig_frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      target: produccion
    container_name: sig_frontend
    restart: unless-stopped
    environment:
      NODE_ENV:       production
      VITE_API_URL:   ${VITE_API_URL}
      VITE_GS_URL:    ${GEOSERVER_URL}
    # Sin puertos expuestos — tráfico solo a través de Nginx
    networks:
      - sig_red
    depends_on:
      - sig_backend

  # ----------------------------------------------------------
  # PROXY INVERSO: Nginx
  # Único servicio con puertos públicos
  # Gestiona subdominios de cada municipalidad (multi-tenant)
  # ----------------------------------------------------------
  sig_nginx:
    image: nginx:alpine
    container_name: sig_nginx
    restart: unless-stopped
    ports:
      # Solo Nginx tiene puertos accesibles desde el exterior
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/sites/:/etc/nginx/conf.d/:ro
      # Certificados SSL gestionados por Certbot
      - certbot_datos:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - sig_red
    depends_on:
      - sig_backend
      - sig_frontend
      - sig_geoserver

# ----------------------------------------------------------
# RED INTERNA — tráfico aislado, sin exposición al host
# ----------------------------------------------------------
networks:
  sig_red:
    driver: bridge
    name: sig_red

# ----------------------------------------------------------
# VOLÚMENES PERSISTENTES
# ----------------------------------------------------------
volumes:
  postgres_data:
    name: sig_postgres_data
  geoserver_data:
    name: sig_geoserver_data
  redis_data:
    name: sig_redis_data
  certbot_datos:
    name: sig_certbot_datos
  certbot_webroot:
    name: sig_certbot_webroot
